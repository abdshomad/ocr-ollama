x-vllm-service: &vllm-service
  image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
  restart: unless-stopped
  ipc: host
  shm_size: "16gb"
  entrypoint: ["/bin/bash", "/docker/vllm-entrypoint.sh"]
  environment: &vllm-env
    HF_HOME: /root/.cache/huggingface
    HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    # One model per L40; raise if a single model runs alone on a GPU
    VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-0.92}
    VLLM_MTP_SPECULATIVE_TOKENS: ${VLLM_MTP_SPECULATIVE_TOKENS:-1}
    VLLM_GLM_MAX_MODEL_LEN: ${VLLM_GLM_MAX_MODEL_LEN:-8192}
  volumes:
    - vllm-hf-cache:/root/.cache/huggingface
    - ./docker/vllm-entrypoint.sh:/docker/vllm-entrypoint.sh:ro

x-vllm-gpu: &vllm-gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            capabilities: [gpu]

services:
  # Build-only convenience for publishing CPU bases (optional profile `bases`).
  # Not intended for `up` (entrypoint exits immediately).
  ocr-base-cv:
    image: ${OCR_BASE_CV_IMAGE:-ocr-ollama-base-cv:bookworm}
    profiles: ["bases"]
    build:
      context: .
      dockerfile: docker/Dockerfile.base-cv
    entrypoint: ["/bin/true"]

  ocr-base-torch-cpu:
    image: ${OCR_BASE_TORCH_CPU_IMAGE:-ocr-ollama-base-torch-cpu:bookworm}
    profiles: ["bases"]
    build:
      context: .
      dockerfile: docker/Dockerfile.base-torch-cpu
      args:
        OCR_BASE_CV_IMAGE: ${OCR_BASE_CV_IMAGE:-ocr-ollama-base-cv:bookworm}
    entrypoint: ["/bin/true"]

  vllm-deepseek:
    <<: [*vllm-service, *vllm-gpu]
    environment:
      <<: *vllm-env
      VLLM_MODEL: deepseek-ai/DeepSeek-OCR
      VLLM_PORT: "8100"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VLLM_DEEPSEEK_CUDA_DEVICE:-0}"]
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/v1/models')\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 60
      start_period: 1800s

  vllm-glm:
    <<: [*vllm-service, *vllm-gpu]
    environment:
      <<: *vllm-env
      VLLM_MODEL: zai-org/GLM-OCR
      VLLM_PORT: "8101"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VLLM_GLM_CUDA_DEVICE:-1}"]
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/v1/models')\"",
