services:
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    restart: unless-stopped
    ipc: host
    shm_size: "16gb"
    gpus: all
    environment:
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - vllm-hf-cache:/root/.cache/huggingface
    ports:
      - "${VLLM_PORT:-8100}:8100"
    command:
      - --model
      - ${VLLM_MODEL:-deepseek-ai/DeepSeek-OCR}
      - --logits-processors
      - vllm.model_executor.models.deepseek_ocr:NGramPerReqLogitsProcessor
      - --chat-template
      - vllm/transformers_utils/chat_templates/template_deepseek_ocr.jinja
      - --no-enable-prefix-caching
      - --mm-processor-cache-gb
      - "0"
      - --host
      - "0.0.0.0"
      - --port
      - "8100"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/v1/models')\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 30
      start_period: 600s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      INFERENCE_BACKEND: ${INFERENCE_BACKEND:-vllm}
      VLLM_HOST: ${VLLM_HOST:-http://vllm:8100}
      VLLM_TIMEOUT: ${VLLM_TIMEOUT:-600}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-300}
      MAX_IMAGE_BYTES: ${MAX_IMAGE_BYTES:-10485760}
    volumes:
      - ./upload:/app/upload
      - ./result:/app/result
      - ./backend/config:/app/backend/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      vllm:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3036}:80"
    depends_on:
      - backend

volumes:
  vllm-hf-cache:
