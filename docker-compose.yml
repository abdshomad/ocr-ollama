x-vllm-service: &vllm-service
  image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
  restart: unless-stopped
  ipc: host
  shm_size: "16gb"
  entrypoint: ["/bin/bash", "/docker/vllm-entrypoint.sh"]
  environment: &vllm-env
    HF_HOME: /root/.cache/huggingface
    HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    # One model per L40; raise if a single model runs alone on a GPU
    VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-0.92}
    VLLM_MTP_SPECULATIVE_TOKENS: ${VLLM_MTP_SPECULATIVE_TOKENS:-1}
    VLLM_GLM_MAX_MODEL_LEN: ${VLLM_GLM_MAX_MODEL_LEN:-8192}
  volumes:
    - vllm-hf-cache:/root/.cache/huggingface
    - ./docker/vllm-entrypoint.sh:/docker/vllm-entrypoint.sh:ro

x-vllm-gpu: &vllm-gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            capabilities: [gpu]

services:
  vllm-deepseek:
    <<: [*vllm-service, *vllm-gpu]
    environment:
      <<: *vllm-env
      VLLM_MODEL: deepseek-ai/DeepSeek-OCR
      VLLM_PORT: "8100"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VLLM_DEEPSEEK_CUDA_DEVICE:-0}"]
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/v1/models')\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 60
      start_period: 1800s

  vllm-glm:
    <<: [*vllm-service, *vllm-gpu]
    environment:
      <<: *vllm-env
      VLLM_MODEL: zai-org/GLM-OCR
      VLLM_PORT: "8101"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VLLM_GLM_CUDA_DEVICE:-1}"]
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/v1/models')\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 60
      start_period: 1800s

  mineru-diffusion:
    profiles: ["mineru"]
    build:
      context: .
      dockerfile: docker/Dockerfile.mineru-diffusion
    image: ${MINERU_DIFFUSION_IMAGE:-ocr-ollama-mineru-diffusion:latest}
    restart: unless-stopped
    ipc: host
    shm_size: "16gb"
    environment:
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      MODEL_PATH: ${MINERU_MODEL_PATH:-opendatalab/MinerU-Diffusion-V1-0320-2.5B}
      MINERU_MODEL_ID: opendatalab/MinerU-Diffusion-V1-0320-2.5B
      MINERU_PORT: "8200"
      MINERU_GPU_MEMORY_UTILIZATION: ${MINERU_GPU_MEMORY_UTILIZATION:-0.8}
      MINERU_GEN_LENGTH: ${MINERU_GEN_LENGTH:-1024}
      MINERU_ENFORCE_EAGER: ${MINERU_ENFORCE_EAGER:-1}
    volumes:
      - vllm-hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${MINERU_DIFFUSION_CUDA_DEVICE:-0}"]
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/health')\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 60
      start_period: 1800s

  vllm-lighton:
    <<: [*vllm-service, *vllm-gpu]
    profiles: ["lighton"]
    build:
      context: .
      dockerfile: docker/Dockerfile.vllm-ocr
    image: ${VLLM_OCR_IMAGE:-ocr-ollama-vllm-ocr:latest}
    # Entrypoint baked into image — avoids bad host bind when started via GPU page (/workspace path).
    volumes:
      - vllm-hf-cache:/root/.cache/huggingface
    environment:
      <<: *vllm-env
      VLLM_MODEL: lightonai/LightOnOCR-2-1B
      VLLM_PORT: "8102"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VLLM_LIGHTON_CUDA_DEVICE:-1}"]
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8102/v1/models')\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 60
      start_period: 1800s

  vllm-chandra:
    <<: [*vllm-service, *vllm-gpu]
    profiles: ["chandra"]
    build:
      context: .
      dockerfile: docker/Dockerfile.vllm-ocr
    image: ${VLLM_OCR_IMAGE:-ocr-ollama-vllm-ocr:latest}
    volumes:
      - vllm-hf-cache:/root/.cache/huggingface
    environment:
      <<: *vllm-env
      VLLM_MODEL: datalab-to/chandra-ocr-2
      VLLM_PORT: "8103"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VLLM_CHANDRA_CUDA_DEVICE:-1}"]
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8103/v1/models')\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 60
      start_period: 1800s

  vllm-gemma4:
    <<: [*vllm-service, *vllm-gpu]
    profiles: ["gemma4"]
    build:
      context: .
      dockerfile: docker/Dockerfile.vllm-ocr
    image: ${VLLM_OCR_IMAGE:-ocr-ollama-vllm-ocr:latest}
    volumes:
      - vllm-hf-cache:/root/.cache/huggingface
    environment:
      <<: *vllm-env
      VLLM_MODEL: google/gemma-4-E4B-it
      VLLM_PORT: "8104"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VLLM_GEMMA4_CUDA_DEVICE:-1}"]
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8104/v1/models')\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 60
      start_period: 1800s

  vllm-qwen3-vl:
    <<: [*vllm-service, *vllm-gpu]
    profiles: ["qwen3vl"]
    build:
      context: .
      dockerfile: docker/Dockerfile.vllm-ocr
    image: ${VLLM_OCR_IMAGE:-ocr-ollama-vllm-ocr:latest}
    volumes:
      - vllm-hf-cache:/root/.cache/huggingface
    environment:
      <<: *vllm-env
      VLLM_MODEL: ${VLLM_QWEN3_VL_MODEL:-Qwen/Qwen3-VL-8B-Instruct}
      VLLM_PORT: "8105"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VLLM_QWEN3_VL_CUDA_DEVICE:-1}"]
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8105/v1/models')\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 60
      start_period: 1800s

  vllm-hunyuanocr:
    <<: [*vllm-service, *vllm-gpu]
    profiles: ["hunyuanocr"]
    build:
      context: .
      dockerfile: docker/Dockerfile.vllm-ocr
    image: ${VLLM_OCR_IMAGE:-ocr-ollama-vllm-ocr:latest}
    volumes:
      - vllm-hf-cache:/root/.cache/huggingface
    environment:
      <<: *vllm-env
      VLLM_MODEL: ${VLLM_HUNYUAN_OCR_MODEL:-tencent/HunyuanOCR}
      VLLM_PORT: "8106"
      # Hunyuan shares a GPU with other optional vLLM services; cap reservation (see issues/hunyuanocr).
      VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_HUNYUAN_OCR_GPU_MEMORY_UTIL:-0.42}
      VLLM_HUNYUAN_OCR_MAX_MODEL_LEN: ${VLLM_HUNYUAN_OCR_MAX_MODEL_LEN:-8192}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VLLM_HUNYUAN_OCR_CUDA_DEVICE:-1}"]
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8106/v1/models')\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 60
      start_period: 1800s

  nemotron-ocr-v2:
    profiles: ["nemotron"]
    build:
      context: .
      dockerfile: docker/Dockerfile.nemotron-ocr
    image: ${NEMOTRON_OCR_IMAGE:-ocr-ollama-nemotron-ocr-v2:latest}
    restart: unless-stopped
    ipc: host
    shm_size: "8gb"
    environment:
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      NEMOTRON_REPO_ROOT: /opt/nemotron-ocr-v2
      NEMOTRON_VARIANT: ${NEMOTRON_VARIANT:-multilingual}
      NEMOTRON_PORT: "8210"
      NEMOTRON_MODEL_ID: nvidia/nemotron-ocr-v2
      NEMOTRON_MERGE_LEVEL: ${NEMOTRON_MERGE_LEVEL:-paragraph}
      NEMOTRON_SKIP_RELATIONAL: ${NEMOTRON_SKIP_RELATIONAL:-0}
    volumes:
      - vllm-hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${NEMOTRON_OCR_CUDA_DEVICE:-0}"]
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8210/health')\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 60
      start_period: 1800s

  rapidocr:
    profiles: ["rapidocr"]
    build:
      context: .
      dockerfile: docker/Dockerfile.rapidocr
    image: ${RAPIDOCR_IMAGE:-ocr-ollama-rapidocr:latest}
    restart: unless-stopped
    environment:
      RAPIDOCR_PORT: "8220"
      RAPIDOCR_MODEL_ID: rapidocr
    volumes:
      - rapidocr-onnx-cache:/root/.cache
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8220/health')\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 300s

  onnxtr:
    profiles: ["onnxtr"]
    build:
      context: .
      dockerfile: docker/Dockerfile.onnxtr
    image: ${ONNXTR_IMAGE:-ocr-ollama-onnxtr:latest}
    restart: unless-stopped
    environment:
      ONNXTR_PORT: "8230"
      ONNXTR_MODEL_ID: onnxtr
    volumes:
      - onnxtr-onnx-cache:/root/.cache
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8230/health')\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 420s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      INFERENCE_BACKEND: ${INFERENCE_BACKEND:-vllm}
      VLLM_DEEPSEEK_HOST: ${VLLM_DEEPSEEK_HOST:-http://vllm-deepseek:8100}
      VLLM_GLM_HOST: ${VLLM_GLM_HOST:-http://vllm-glm:8101}
      VLLM_LIGHTON_HOST: ${VLLM_LIGHTON_HOST:-http://vllm-lighton:8102}
      VLLM_CHANDRA_HOST: ${VLLM_CHANDRA_HOST:-http://vllm-chandra:8103}
      VLLM_GEMMA4_HOST: ${VLLM_GEMMA4_HOST:-http://vllm-gemma4:8104}
      VLLM_QWEN3_VL_HOST: ${VLLM_QWEN3_VL_HOST:-http://vllm-qwen3-vl:8105}
      VLLM_HUNYUAN_OCR_HOST: ${VLLM_HUNYUAN_OCR_HOST:-http://vllm-hunyuanocr:8106}
      MINERU_DIFFUSION_HOST: ${MINERU_DIFFUSION_HOST:-http://mineru-diffusion:8200}
      NEMOTRON_OCR_HOST: ${NEMOTRON_OCR_HOST:-http://nemotron-ocr-v2:8210}
      RAPIDOCR_HOST: ${RAPIDOCR_HOST:-http://rapidocr:8220}
      ONNXTR_HOST: ${ONNXTR_HOST:-http://onnxtr:8230}
      VLLM_HOST: ${VLLM_HOST:-http://vllm-deepseek:8100}
      VLLM_TIMEOUT: ${VLLM_TIMEOUT:-600}
      # Listing /api/models probes every vLLM host in parallel; allow slow /v1/models (cold GPU).
      MODEL_LIST_HTTP_TIMEOUT: ${MODEL_LIST_HTTP_TIMEOUT:-45}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-300}
      MAX_IMAGE_BYTES: ${MAX_IMAGE_BYTES:-10485760}
      # Host repo path for `docker compose` via socket (see COMPOSE_HOST_PROJECT_DIR in .env)
      COMPOSE_HOST_PROJECT_DIR: ${COMPOSE_HOST_PROJECT_DIR:-}
      COMPOSE_PROJECT_DIR: ${COMPOSE_HOST_PROJECT_DIR:-}
      COMPOSE_FILE: ${COMPOSE_HOST_PROJECT_DIR:-}/docker-compose.yml
      # Must match `docker compose` project when started from this repo (default: directory name)
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-ocr-ollama}
    volumes:
      - ./upload:/app/upload
      - ./result:/app/result
      - ./SAMPLES/IMAGES:/app/SAMPLES/IMAGES:ro
      - ./backend/config:/app/backend/config
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3036}:80"
    depends_on:
      - backend

volumes:
  vllm-hf-cache:
  rapidocr-onnx-cache:
  onnxtr-onnx-cache:
