    image: ${VLLM_OCR_IMAGE:-ocr-ollama-vllm-ocr:latest}
    # Entrypoint baked into image — avoids bad host bind when started via GPU page (/workspace path).
    volumes:
      - vllm-hf-cache:/root/.cache/huggingface
    environment:
      <<: *vllm-env
      VLLM_MODEL: lightonai/LightOnOCR-2-1B
      VLLM_PORT: "8102"
    deploy:
